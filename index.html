  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicGroup",
    "name": "Duo EnPassant",
    "url": "https://www.duoenpassant.com/",
    "description": "Viiul ja tšello duo pulmadeks, matusteks ja üritusteks Tallinnas ja üle Eesti.",
    "genre": "Classical",
    "email": "info@duoenpassant.com",
    "member": [
      { "@type": "Person", "name": "Merily Leotoots", "jobTitle": "Viiuldaja" },

    ],
    "sameAs": [
      "https://www.instagram.com/duo_enpassant",

  <link rel="preload" as="image" href="001.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1614;
      --parchment: #f5f0e8;
      --warm: #c8a96e;
      --muted: #7a6f65;
      --line: rgba(200,169,110,0.4);
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Cormorant Garamond', Georgia, serif; }

    .bg-photo {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      background-color: #b2a08f;
    }
    .bg-photo.mobile-contain {
      object-fit: contain;
      object-position: center bottom;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom,
        rgba(26,22,20,0.30) 0%,
        rgba(26,22,20,0.20) 30%,
        rgba(26,22,20,0.38) 70%,
        rgba(26,22,20,0.55) 100%);
      z-index: 1;
    }

    .landing {
      position: relative; z-index: 3;
      height: 100vh;
    }

    /* Language switcher */
    .lang-row {
      position: absolute; top: 1.8rem; right: 2.2rem;
      display: flex; align-items: center; gap: 0.5rem;
      z-index: 4;
    }
    .lang-btn {
      cursor: pointer; background: none;
      border: 1px solid transparent;
      color: rgba(245,240,232,0.6);
      font-family: 'Cinzel', serif; font-size: 0.82rem; letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
      padding: 0.3rem 0.75rem; border-radius: 2px;
    }
    .lang-btn:hover { color: rgba(245,240,232,0.9); }
    .lang-btn.active { color: var(--warm); border-color: var(--line); }
    .lang-separator { color: rgba(200,169,110,0.35); font-size: 0.82rem; font-family: 'Cinzel', serif; }

    /* Title positioned top-left, in the empty background area above/left of the musicians */
    .landing-content-wrap {
      position: absolute;
      top: 5vh;
      left: 0;
      display: flex;
      justify-content: flex-start;
      padding: 0 1.5rem;
    }

    .landing-content {
      text-align: left;
      opacity: 0; transform: translateY(28px);
    }
    .landing-content.ready {
      animation: fadeUp 1.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @media (min-width: 769px) {
      .landing-content-wrap {
        padding-left: 4vw;
        top: 5vh;
      }
    }

    @media (max-width: 768px) {
      .landing-content-wrap {
        left: 0; right: 0;
        justify-content: center;
        top: 24vh;
        padding: 0 1.5rem;
      }
      .landing-content { text-align: center; }
      .landing-rule { margin: 1.4rem auto; background: linear-gradient(to right, transparent, var(--warm), transparent); }
    }

    .landing-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.3rem, 5.6vw, 4.4rem);
      font-weight: 400; color: var(--parchment);
      letter-spacing: 0.06em; line-height: 1.05; margin-bottom: 0.3rem;
    }
    .landing-title em {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(2.6rem, 6.6vw, 5.2rem); font-weight: 300;
      color: var(--warm); letter-spacing: 0.02em;
      text-shadow: 0 0 1px rgba(26,22,20,0.6), 0 1px 3px rgba(26,22,20,0.35);
    }
    .landing-rule {
      width: 120px; height: 1px;
      background: linear-gradient(to right, var(--warm), transparent);
      margin: 1.6rem 0;
    }

    /* Names: one per pedestal cube. Exact left/top set via JS to match photo proportions precisely. */
    .pedestal-name {
      position: absolute;
      text-align: center;
      width: 34vw;
      max-width: 152px;
      opacity: 0; transform: translate(-50%, calc(-50% + 14px));
      z-index: 3;
    }
    .pedestal-name.ready {
      animation: fadeUpName 1.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes fadeUpName { to { opacity: 1; transform: translate(-50%, -50%); } }

    .landing-names {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.8rem, 3.2vw, 1.05rem); font-weight: 500;
      color: rgba(250,246,240,0.92); font-style: normal;
      letter-spacing: 0.07em; text-transform: uppercase;
      line-height: 1.55;
      text-shadow: 0 1px 4px rgba(26,22,20,0.35);
    }

    /* Enter button: exact left/top set via JS to land in a clear area */
    .bottom-enter {
      position: absolute;
      transform: translate(-50%, -50%);
      opacity: 0;
      z-index: 3;
    }
    .bottom-enter.ready {
      animation: fadeUpEnter 1.3s cubic-bezier(0.16,1,0.3,1) forwards;
      animation-delay: 0.2s;
    }
    @keyframes fadeUpEnter { to { opacity: 1; transform: translate(-50%, -50%); } }

    @media (min-width: 769px) {
      .pedestal-name { width: 13vw; max-width: 195px; }
      .landing-names { font-size: clamp(0.95rem, 1.7vw, 1.35rem); }
    }
    .enter-btn {
      display: inline-block;
      font-family: 'Cinzel', serif; font-size: clamp(0.6rem, 1.6vw, 0.75rem);
      letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--ink);
      border: 1px solid rgba(26,22,20,0.45);
      padding: 0.7rem 1.6rem; text-decoration: none;
      position: relative; overflow: hidden;
      transition: color 0.3s, border-color 0.3s;
      white-space: nowrap;
    }
    .enter-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--ink); transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); z-index: 0;
    }
    .enter-btn:hover { color: var(--parchment); border-color: var(--ink); }
    .enter-btn:hover::before { transform: translateX(0); }
    .enter-btn span { position: relative; z-index: 1; }
    .bottom-enter { position: absolute; }

    @media (max-width: 768px) {
      .bottom-enter.enter-btn {
        color: rgba(245,240,232,0.75);
        border-color: rgba(245,240,232,0.35);
      }
      .bottom-enter.enter-btn::before { background: rgba(245,240,232,0.85); }
      .bottom-enter.enter-btn:hover { color: var(--ink); }
      .bottom-enter.ready { opacity: 0.8; }
      @keyframes fadeUpEnter { to { opacity: 0.8; transform: translate(-50%, -50%); } }
    }

    /* Language show/hide */
    [data-lang] { display: none; }
    body.lang-en  [data-lang="en"]  { display: inline; }
    body.lang-est [data-lang="est"] { display: inline; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .lang-row { top: 1.2rem; right: 1.4rem; }
      .landing-content-wrap { top: 4.5vh; }
      .landing-rule { margin: 1.3rem 0; }
    }
  </style>

</head>

<body class="lang-en">

<img class="bg-photo" alt="" aria-hidden="true">
  <div class="bg-overlay" aria-hidden="true"></div>

  <div class="landing">

    <div class="lang-row" aria-label="Language selector">
      <button class="lang-btn active" data-lang-switch="en"  type="button">EN</button>
      <span class="lang-separator">|</span>
      <button class="lang-btn"        data-lang-switch="est" type="button">EST</button>
    </div>

    <div class="landing-content-wrap">
      <div class="landing-content">
        <h1 class="landing-title">Duo <em>En<br>Passant</em></h1>
        <div class="landing-rule"></div>
      </div>
    </div>

    <div class="pedestal-name pedestal-name--left">
      <p class="landing-names">Merily<br>Leotoots</p>
    </div>

    <div class="pedestal-name pedestal-name--right">
      <p class="landing-names">Anna<br>Ryland-Jones</p>
    </div>

    <a href="site.html" class="bottom-enter enter-btn" id="enterBtn">
      <span data-lang="en">Enter</span>
      <span data-lang="est">Sisene</span>
    </a>

  </div>

  <script>
    const body = document.body;

    function setLang(lang) {
      body.classList.toggle('lang-en',  lang === 'en');
      body.classList.toggle('lang-est', lang === 'est');
      localStorage.setItem('dep-lang', lang);
      document.querySelectorAll('[data-lang-switch]').forEach(b => {
        b.classList.toggle('active', b.dataset.langSwitch === lang);
      });
    }

    const saved = localStorage.getItem('dep-lang');
    if (saved) setLang(saved);

    document.querySelectorAll('[data-lang-switch]').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.langSwitch));
    });

    // === Taustapildi valik ja täpne teksti paigutus foto proportsioonide järgi ===
    const bgImg = document.querySelector('.bg-photo');
    const nameLeftEl  = document.querySelector('.pedestal-name--left');
    const nameRightEl = document.querySelector('.pedestal-name--right');
    const enterEl     = document.querySelector('.bottom-enter');
    const titleEl     = document.querySelector('.landing-content');

    // Punktid on määratud originaalfoto protsentides (x/y = % pildi laiusest/kõrgusest),
    // mõõdetud otse fotodelt (violin/cello pjedestaalide asukohad).
    const ANCHORS = {
      desktop: {
        src: '001.jpg', w: 2048, h: 1365, fit: 'cover',
        nameLeft:  { x: 32.25, y: 77.5 },
        nameRight: { x: 80.25, y: 83.25 }
      },
      mobile: {
        src: '002.jpg', w: 1365, h: 2048, fit: 'contain-bottom',
        nameLeft:  { x: 19.0, y: 85 },
        nameRight: { x: 78.5, y: 86 }
      }
    };

    function getMode() {
      const isMobile = window.matchMedia('(orientation: portrait)').matches || window.innerWidth < 768;
      return isMobile ? 'mobile' : 'desktop';
    }

    function computeLayout(a) {
      const vw = window.innerWidth, vh = window.innerHeight;
      let scale, offX, offY;
      if (a.fit === 'contain-bottom') {
        scale = Math.min(vw / a.w, vh / a.h);
        offX = (vw - a.w * scale) / 2;
        offY = vh - a.h * scale;
      } else {
        scale = Math.max(vw / a.w, vh / a.h);
        offX = (vw - a.w * scale) / 2;
        offY = (vh - a.h * scale) / 2;
      }
      const toPx = (pt) => ({ x: offX + (pt.x / 100) * a.w * scale, y: offY + (pt.y / 100) * a.h * scale });
      return { nameLeft: toPx(a.nameLeft), nameRight: toPx(a.nameRight) };
    }

    let currentMode = null;

    function applyLayout() {
      const mode = getMode();
      const a = ANCHORS[mode];

      bgImg.classList.toggle('mobile-contain', mode === 'mobile');
      if (currentMode !== mode) {
        bgImg.src = a.src;
        currentMode = mode;
      }

      const layout = computeLayout(a);
      nameLeftEl.style.left = layout.nameLeft.x + 'px';
      nameLeftEl.style.top = layout.nameLeft.y + 'px';
      nameRightEl.style.left = layout.nameRight.x + 'px';
      nameRightEl.style.top = layout.nameRight.y + 'px';

      // Enter nupp seotakse pealkirja asukohaga, mitte fotoga:
      // Desktop: ekraani allservas, horisontaalselt pealkirja keskkoha kohal.
      // Mobiil: vahetult pealkirja all, samuti keskel.
      const titleBox = titleEl.getBoundingClientRect();
      const centerX = titleBox.left + titleBox.width / 2;
      if (mode === 'desktop') {
        enterEl.style.left = centerX + 'px';
        enterEl.style.top = (window.innerHeight - 56) + 'px';
      } else {
        enterEl.style.left = centerX + 'px';
        enterEl.style.top = (titleBox.bottom + 34) + 'px';
      }
    }

    applyLayout();
    window.addEventListener('resize', applyLayout);
    window.addEventListener('orientationchange', () => setTimeout(applyLayout, 150));
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', applyLayout);
    }
    // Mobiili brauserite aadressiriba peidab/näitab end viivitusega, mis muudab akna kõrgust
    // pärast esimest laadimist - arvutame paigutuse veel paar korda üle, et see kindlasti õigeks jääks.
    setTimeout(applyLayout, 400);
    setTimeout(applyLayout, 1200);

    // Näita sisu alles siis, kui taustapilt on laaditud
    const revealTargets = document.querySelectorAll('.landing-content, .pedestal-name, .bottom-enter');

    function revealContent() {
      revealTargets.forEach(el => el.classList.add('ready'));
    }

    if (bgImg.complete && bgImg.src) {
      revealContent();
    } else {
      bgImg.addEventListener('load', revealContent);
      setTimeout(revealContent, 3500);
    }
  </script>

</body>
</html>
