  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "name": "Duo EnPassant",

    "email": "info@duoenpassant.com",
    "member": [
      { "@type": "Person", "name": "Merily Leotoots", "jobTitle": "Viiuldaja" },
      { "@type": "Person", "name": "Anna Ryland-Jones", "jobTitle": "Tšellist" }
    ],
    "sameAs": [
      "https://www.instagram.com/duo_enpassant",
      "https://www.facebook.com/profile.php?id=61576658983538",

    ]
  }
  </script>

  <link rel="preload" as="image" href="001.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1614;
      --parchment: #f5f0e8;
      --warm: #c8a96e;
      --muted: #7a6f65;
      --line: rgba(200,169,110,0.4);
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Cormorant Garamond', Georgia, serif; }

    .bg-photo {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom,
        rgba(26,22,20,0.30) 0%,
        rgba(26,22,20,0.20) 30%,
        rgba(26,22,20,0.38) 70%,
        rgba(26,22,20,0.55) 100%);
      z-index: 1;
    }

    .landing {
      position: relative; z-index: 3;
      height: 100vh;
    }

    /* Language switcher */
    .lang-row {
      position: absolute; top: 1.8rem; right: 2.2rem;
      display: flex; align-items: center; gap: 0.5rem;
      z-index: 4;
    }
    .lang-btn {
      cursor: pointer; background: none;
      border: 1px solid transparent;
      color: rgba(245,240,232,0.6);
      font-family: 'Cinzel', serif; font-size: 0.82rem; letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
      padding: 0.3rem 0.75rem; border-radius: 2px;
    }
    .lang-btn:hover { color: rgba(245,240,232,0.9); }
    .lang-btn.active { color: var(--warm); border-color: var(--line); }
    .lang-separator { color: rgba(200,169,110,0.35); font-size: 0.82rem; font-family: 'Cinzel', serif; }

    /* Positioning wrapper: placed in the empty background area of the photo.
       Mobile: huge empty band above the musicians' heads (top ~37% of photo).
       Desktop: empty gap between the two musicians (~35%-62% of photo width). */
    .landing-content-wrap {
      position: absolute;
      top: 7vh;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      padding: 0 1.5rem;
    }

    .landing-content {
      text-align: center;
      opacity: 0; transform: translateY(28px);
    }
    .landing-content.ready {
      animation: fadeUp 1.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @media (min-width: 769px) {
      .landing-content-wrap {
        justify-content: center;
        left: 58.5%;
        transform: translateX(-50%);
        padding-left: 0;
        top: 6vh;
      }
    }

    .landing-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.3rem, 5.4vw, 3.6rem);
      font-weight: 400; color: var(--parchment);
      letter-spacing: 0.06em; line-height: 1.05; margin-bottom: 0.3rem;
    }
    .landing-title em {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(2.6rem, 6.3vw, 4.2rem); font-weight: 300;
      color: var(--warm); letter-spacing: 0.02em;
    }
    .landing-rule {
      width: 120px; height: 1px;
      background: linear-gradient(to right, transparent, var(--warm), transparent);
      margin: 1.6rem auto;
    }
    /* Names positioned on the left pedestal cube (under the violin) */
    .pedestal-names {
      position: absolute;
      left: 2%;
      top: 76%;
      width: 21%;
      text-align: center;
      opacity: 0; transform: translateY(14px);
      z-index: 3;
    }
    .pedestal-names.ready {
      animation: fadeUp 1.3s cubic-bezier(0.16,1,0.3,1) forwards;
      animation-delay: 0.15s;
    }
    .landing-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.5rem, 2vw, 0.68rem); font-weight: 400;
      color: var(--ink); font-style: italic;
      line-height: 1.5;
    }

    /* Enter button positioned on the right pedestal cube (under the cellist) */
    .pedestal-enter {
      position: absolute;
      left: 86%;
      top: 82%;
      transform: translate(-50%, -50%);
      opacity: 0; transform-origin: center;
      z-index: 3;
    }
    .pedestal-enter.ready {
      animation: fadeUpEnter 1.3s cubic-bezier(0.16,1,0.3,1) forwards;
      animation-delay: 0.3s;
    }
    @keyframes fadeUpEnter { to { opacity: 1; transform: translate(-50%, -50%); } }

    @media (min-width: 769px) {
      .pedestal-names {
        left: 27.5%;
        top: 66%;
        width: 10%;
      }
      .pedestal-enter {
        left: 81%;
        top: 78%;
      }
    }
    .enter-btn {
      display: inline-block;
      font-family: 'Cinzel', serif; font-size: clamp(0.42rem, 1.4vw, 0.58rem);
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--ink);
      border: 1px solid rgba(26,22,20,0.4);
      padding: 0.55rem 1rem; text-decoration: none;
      position: relative; overflow: hidden;
      transition: color 0.3s, border-color 0.3s;
      white-space: nowrap;
    }
    .enter-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--ink); transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); z-index: 0;
    }
    .enter-btn:hover { color: var(--parchment); border-color: var(--ink); }
    .enter-btn:hover::before { transform: translateX(0); }
    .enter-btn span { position: relative; z-index: 1; }

    /* Language show/hide */
    [data-lang] { display: none; }
    body.lang-en  [data-lang="en"]  { display: inline; }
    body.lang-est [data-lang="est"] { display: inline; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .lang-row { top: 1.2rem; right: 1.4rem; }
      .landing-content-wrap { top: 5.5vh; }
      .landing-rule { margin: 1.3rem auto; }
      .landing-names { margin-bottom: 1.5rem; }
      .landing-sub { margin-bottom: 1.5rem; }
    }
  </style>

</head>

<body class="lang-en">

<img class="bg-photo" alt="" aria-hidden="true">
  <div class="bg-overlay" aria-hidden="true"></div>

  <div class="landing">

    <div class="lang-row" aria-label="Language selector">
      <button class="lang-btn active" data-lang-switch="en"  type="button">EN</button>
      <span class="lang-separator">|</span>
      <button class="lang-btn"        data-lang-switch="est" type="button">EST</button>
    </div>

    <div class="landing-content-wrap">
      <div class="landing-content">
        <h1 class="landing-title">Duo <em>En<br>Passant</em></h1>
        <div class="landing-rule"></div>
      </div>
    </div>

    <div class="pedestal-names">
      <p class="landing-names">
        Merily Leotoots<br>
        Anna Ryland-Jones
      </p>
    </div>

    <a href="site.html" class="pedestal-enter enter-btn" id="enterBtn">
      <span data-lang="en">Enter</span>
      <span data-lang="est">Sisene</span>
    </a>

  </div>

  <script>
    const body = document.body;

    function setLang(lang) {
      body.classList.toggle('lang-en',  lang === 'en');
      body.classList.toggle('lang-est', lang === 'est');
      localStorage.setItem('dep-lang', lang);
      document.querySelectorAll('[data-lang-switch]').forEach(b => {
        b.classList.toggle('active', b.dataset.langSwitch === lang);
      });
    }

    const saved = localStorage.getItem('dep-lang');
    if (saved) setLang(saved);

    document.querySelectorAll('[data-lang-switch]').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.langSwitch));
    });

    // === Vali õige taustapilt (desktop vs telefon) ===
    const bgImg = document.querySelector('.bg-photo');

    function chooseBackgroundImage() {
      const isMobile = window.matchMedia('(orientation: portrait)').matches || window.innerWidth < 768;
      bgImg.src = isMobile ? '002.jpg' : '001.jpg';
    }

    chooseBackgroundImage();

    // Kui keegi pöörab telefoni, uuendame pilti
    window.addEventListener('orientationchange', () => {
      setTimeout(chooseBackgroundImage, 150);
    });

    // Näita sisu alles siis, kui taustapilt on laaditud
    const revealTargets = document.querySelectorAll('.landing-content, .pedestal-names, .pedestal-enter');

    function revealContent() {
      revealTargets.forEach(el => el.classList.add('ready'));
    }

    if (bgImg.complete && bgImg.src) {
      revealContent();
    } else {
      bgImg.addEventListener('load', revealContent);
      setTimeout(revealContent, 3500);
    }
  </script>

</body>
</html>
