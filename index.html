<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Duo EnPassant | Violin & Cello Duo</title>
  <meta name="description" content="Duo EnPassant — violin and cello duo performing classical chamber music." />
  <link rel="canonical" href="https://www.duoenpassant.com/" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #1a1614;
      --parchment: #f5f0e8;
      --warm: #c8a96e;
      --muted: #7a6f65;
      --line: rgba(200, 169, 110, 0.4);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    /* ── FULL-SCREEN PHOTO BACKGROUND ── */
    .bg-photo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;
    }

    /* Dark overlay so text is always readable */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(20, 16, 14, 0.55) 0%,
        rgba(20, 16, 14, 0.65) 60%,
        rgba(20, 16, 14, 0.80) 100%
      );
      z-index: 1;
    }

    /* Subtle noise texture */
    .bg-noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 2;
      opacity: 0.5;
    }

    /* ── LANDING WRAPPER ── */
    .landing {
      position: relative;
      z-index: 3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── LANGUAGE SWITCHER ── */
    .lang-row {
      position: absolute;
      top: 1.8rem;
      right: 2.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .lang-btn {
      cursor: pointer;
      background: none;
      border: 1px solid transparent;
      color: rgba(245,240,232,0.5);
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
      padding: 0.3rem 0.75rem;
      border-radius: 2px;
    }
    .lang-btn:hover { color: rgba(245,240,232,0.9); }
    .lang-btn.active {
      color: var(--warm);
      border-color: var(--line);
    }
    .lang-separator {
      color: rgba(200,169,110,0.35);
      font-size: 0.82rem;
      font-family: 'Cinzel', serif;
    }

    /* ── CENTERED CONTENT ── */
    .landing-content {
      text-align: center;
      opacity: 0;
      transform: translateY(28px);
      animation: fadeUp 1.3s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }

    .clef-hero {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      display: block;
    }

    .landing-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 1.6rem;
    }

    .landing-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 400;
      color: var(--parchment);
      letter-spacing: 0.08em;
      line-height: 1.05;
      margin-bottom: 0.3rem;
    }

    .landing-title em {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(2.8rem, 7vw, 4.8rem);
      font-weight: 300;
      color: var(--warm);
      letter-spacing: 0.02em;
    }

    .landing-rule {
      width: 160px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--warm), transparent);
      margin: 2rem auto;
    }

    .landing-sub {
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.55);
      margin-bottom: 2rem;
    }

    .landing-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 1.6vw, 1.15rem);
      font-weight: 300;
      color: rgba(245,240,232,0.45);
      font-style: italic;
      line-height: 2;
      margin-bottom: 2.6rem;
    }

    .enter-btn {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--parchment);
      border: 1px solid rgba(200,169,110,0.5);
      padding: 0.9rem 2.6rem;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--warm);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
      z-index: 0;
    }
    .enter-btn:hover { color: var(--ink); border-color: var(--warm); }
    .enter-btn:hover::before { transform: translateX(0); }
    .enter-btn span { position: relative; z-index: 1; }

    /* ── LANGUAGE VISIBILITY ── */
    [data-lang] { display: none; }
    body.lang-en  [data-lang="en"]  { display: inline; }
    body.lang-est [data-lang="est"] { display: inline; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .landing { padding: 1.5rem; }
      .lang-row { top: 1.2rem; right: 1.4rem; }
      .clef-hero { width: 64px; height: 64px; margin-bottom: 1.4rem; }
      .landing-rule { margin: 1.4rem auto; }
      .landing-names { margin-bottom: 1.8rem; }
      .landing-sub { margin-bottom: 1.6rem; }
    }
  </style>

</head>

  </div>

  <script>
    const body = document.body;
    document.querySelectorAll('[data-lang-switch]').forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.dataset.langSwitch;
        body.classList.toggle('lang-en',  lang === 'en');
        body.classList.toggle('lang-est', lang === 'est');
        document.querySelectorAll('[data-lang-switch]').forEach(b => {
          b.classList.toggle('active', b === btn);
        });
      });
    });
  </script>

</body>
