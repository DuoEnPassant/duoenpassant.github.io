<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Media | Duo EnPassant</title>
  <meta name="description" content="Media — Duo EnPassant violin and cello duo. Videos and photos." />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #1a1614;
      --parchment: #f5f0e8;
      --warm: #c8a96e;
      --muted: #7a6f65;
      --line: rgba(200,169,110,0.3);
      --max-width: 1100px;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--parchment);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--warm); }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,240,232,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      display: flex; align-items: center;
      width: 100%; padding: 0.5rem 1.5rem;
      position: relative;
    }
    .home-btn {
      display: flex; align-items: center; gap: 0.6rem;
      text-decoration: none; color: var(--ink);
      transition: opacity 0.2s; flex-shrink: 0;
    }
    .home-btn:hover { opacity: 0.72; color: var(--ink); }
    .clef-logo { width: 48px; height: 48px; flex-shrink: 0; }
    .home-wordmark {
      font-family: 'Cinzel', serif; font-size: 0.68rem;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--ink); line-height: 1.5;
    }
    .home-wordmark span { display: block; font-size: 0.55rem; letter-spacing: 0.35em; color: var(--muted); }

    .topbar-center { position: absolute; left: 50%; transform: translateX(-50%); }
    .nav-links {
      display: flex; gap: 1.8rem;
      font-family: 'Cinzel', serif; font-size: 0.68rem;
      letter-spacing: 0.3em; text-transform: uppercase;
    }
    .nav-link { position: relative; color: var(--muted); transition: color 0.25s; }
    .nav-link.active { color: var(--warm); }
    .nav-link::after {
      content: ""; position: absolute; left: 0; bottom: -0.3rem;
      width: 0; height: 1px; background: var(--warm); transition: width 0.25s;
    }
    .nav-link:hover { color: var(--ink); }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }

    .lang-toggle {
      display: flex; align-items: center; gap: 0.5rem;
      font-family: 'Cinzel', serif; font-size: 0.72rem;
      letter-spacing: 0.25em; flex-shrink: 0; margin-left: auto;
    }
    .lang-btn {
      cursor: pointer; border: 1px solid transparent; background: none;
      color: var(--muted); padding: 0.25rem 0.6rem;
      text-transform: uppercase; letter-spacing: 0.25em;
      font-family: 'Cinzel', serif; font-size: 0.72rem;
      transition: color 0.2s, border-color 0.2s; border-radius: 2px;
    }
    .lang-btn.active { color: var(--warm); border-color: var(--line); }
    .lang-btn:hover { color: var(--ink); }
    .lang-separator { color: var(--line); font-size: 0.72rem; }

    .hamburger-btn {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; width: 36px; height: 36px;
      background: none; border: none; cursor: pointer;
      margin-left: auto; padding: 4px; flex-shrink: 0;
    }
    .hamburger-btn span {
      display: block; height: 2px; background: var(--warm);
      border-radius: 2px; transition: transform 0.3s, opacity 0.3s;
    }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .mobile-drawer {
      display: none; position: fixed; inset: 0;
      background: rgba(245,240,232,0.98); backdrop-filter: blur(10px);
      z-index: 99; flex-direction: column; align-items: center;
      justify-content: center; gap: 2.5rem;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .mobile-drawer.open { opacity: 1; pointer-events: all; }
    .mobile-drawer a, .mobile-drawer button {
      font-family: 'Cinzel', serif; font-size: 1.1rem;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--ink); text-decoration: none;
      background: none; border: none; cursor: pointer;
      transition: color 0.2s; padding: 0.3rem 0;
    }
    .mobile-drawer a:hover, .mobile-drawer button:hover { color: var(--warm); }
    .mobile-drawer-rule { width: 40px; height: 1px; background: var(--line); }
    .mobile-lang-row { display: flex; align-items: center; gap: 0.6rem; }
    .mobile-lang-btn {
      font-family: 'Cinzel', serif; font-size: 0.9rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); background: none;
      border: 1px solid transparent; cursor: pointer;
      padding: 0.3rem 0.7rem; border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .mobile-lang-btn.active { color: var(--warm); border-color: var(--line); }

    /* ── PAGE HERO ── */
    .page-hero {
      background: var(--ink);
      padding: 4rem 1.5rem 3.5rem;
      position: relative; overflow: hidden;
    }
    .page-hero-staff {
      position: absolute; left: 0; right: 0;
      top: 50%; transform: translateY(-50%);
      opacity: 0.06; pointer-events: none;
    }
    .page-hero-staff span { display: block; height: 1px; background: var(--parchment); margin: 16px 0; }
    .page-hero-inner {
      position: relative; z-index: 2;
      max-width: var(--max-width); margin: 0 auto;
      display: flex; align-items: flex-end;
      justify-content: space-between; gap: 2rem; flex-wrap: wrap;
    }
    .page-hero-eyebrow {
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      letter-spacing: 0.5em; text-transform: uppercase;
      color: var(--warm); margin-bottom: 1rem; display: block;
    }
    .page-hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 400; color: var(--parchment);
      letter-spacing: 0.08em; line-height: 1;
    }
    .page-hero-title em {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      color: var(--warm); letter-spacing: 0.02em;
    }
    .page-hero-rule {
      width: 1px; height: 60px; align-self: center;
      background: linear-gradient(to bottom, transparent, var(--warm), transparent);
      flex-shrink: 0;
    }
    .page-hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.1rem;
      color: rgba(245,240,232,0.45); max-width: 20rem;
    }

    /* ── SHARED ── */
    .container { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 1.5rem; }
    .content-section { padding: 5rem 0; }
    .content-section + .content-section { border-top: 1px solid var(--line); }

    .section-label {
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      letter-spacing: 0.5em; text-transform: uppercase;
      color: var(--warm); margin-bottom: 3rem;
      display: flex; align-items: center; gap: 1.5rem;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, var(--line), transparent);
    }

    /* ── VIDEOS ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }
    .video-card {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .video-card.visible { opacity: 1; transform: translateY(0); }
    .video-card:nth-child(2) { transition-delay: 0.15s; }
    .video-frame-wrapper {
      position: relative; aspect-ratio: 16/9; overflow: hidden;
      background: var(--ink);
      box-shadow: 0 0 0 1px var(--line), 6px 6px 0 var(--line);
    }
    .video-frame-wrapper iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }

    /* ── PHOTOS ── */

    /*
      3-column grid with fixed row height.
      Col 1 (EP.jpg):    spans 2 rows → tall portrait anchor
      Col 2 (Intro.png): row 1 — landscape crop
      Col 3 (img.jpg):   row 1 — landscape crop
      Row height is fixed so span-2 fills correctly.
    */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 220px;   /* each row is 220px; col 1 = 220+gap+220 = ~451px */
      gap: 1rem;
    }

    .photo-item {
      cursor: pointer;
      overflow: hidden;
      position: relative;
      background: var(--ink);
      box-shadow: 0 0 0 1px var(--line);
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1),
                  transform 0.8s cubic-bezier(0.16,1,0.3,1),
                  box-shadow 0.3s;
    }

    /* First photo: spans 2 rows → tall portrait */
    .photo-item:nth-child(1) {
      grid-row: span 2;
    }

    .photo-item.visible { opacity: 1; transform: translateY(0); }
    .photo-item:nth-child(2) { transition-delay: 0.12s; }
    .photo-item:nth-child(3) { transition-delay: 0.24s; }

    .photo-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), filter 0.3s;
      display: block;
    }
    .photo-item:hover { box-shadow: 0 0 0 1px var(--warm), 6px 6px 0 rgba(200,169,110,0.2); }
    .photo-item:hover img { transform: scale(1.04); filter: brightness(0.82); }

    .photo-item::after {
      content: '+';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-size: 2rem;
      color: rgba(200,169,110,0.9);
      opacity: 0; transition: opacity 0.3s;
    }
    .photo-item:hover::after { opacity: 1; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(26,22,20,0.96);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.35s;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox-img {
      max-width: min(90vw, 700px);
      max-height: 88vh;
      object-fit: contain;
      box-shadow: 0 0 0 1px var(--line), 0 40px 80px rgba(0,0,0,0.8);
      opacity: 0; transform: scale(0.96);
      transition: opacity 0.35s 0.05s, transform 0.35s 0.05s;
    }
    .lightbox.open .lightbox-img { opacity: 1; transform: scale(1); }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      font-family: 'Cinzel', serif; font-size: 0.7rem;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(245,240,232,0.5); cursor: pointer;
      background: none; border: none;
      transition: color 0.2s;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .lightbox-close::before { content: '×'; font-size: 1.5rem; font-family: serif; line-height: 1; }
    .lightbox-close:hover { color: var(--warm); }
    .lightbox-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid rgba(200,169,110,0.25);
      color: rgba(245,240,232,0.5); cursor: pointer;
      font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .lightbox-arrow:hover { border-color: var(--warm); color: var(--warm); }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }
    .lightbox-caption {
      position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 0.9rem; color: rgba(245,240,232,0.4);
      letter-spacing: 0.1em; white-space: nowrap;
    }

    /* ── LANGUAGE ── */
    [data-lang-block] { display: none; }
    body.lang-en  [data-lang-block="en"]  { display: block; }
    body.lang-est [data-lang-block="est"] { display: block; }

    /* ── FOOTER ── */
    footer {
      margin-top: auto; background: var(--ink);
      padding: 2rem 3rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    footer .logo { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.3em; color: rgba(245,240,232,0.3); text-transform: uppercase; }
    footer .tagline { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem; color: var(--warm); opacity: 0.65; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .fade-in { opacity: 0; transform: translateY(20px); animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards; }

    /* ── RESPONSIVE ── */
    @media (max-width: 800px) {
      .hamburger-btn { display: flex; }
      .topbar-center, .lang-toggle, .home-wordmark { display: none; }
      .topbar-inner { padding: 0.4rem 1rem; }
      .mobile-drawer { display: flex; }
      .page-hero { padding: 3rem 1.5rem 2.5rem; }
      .page-hero-rule, .page-hero-sub { display: none; }
      .video-grid { grid-template-columns: 1fr; gap: 1.5rem; }

      /* Mobile: 2-column grid, fixed rows */
      .photo-grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 160px; gap: 0.75rem; }
      .photo-item:nth-child(1) { grid-row: span 2; }

      .lightbox-img { max-width: 95vw; }
      .lightbox-arrow { display: none; }
      footer { flex-direction: column; gap: 0.75rem; text-align: center; padding: 1.5rem; }
      .container { padding: 0 1.2rem; }
      .content-section { padding: 3.5rem 0; }
    }

    @media (max-width: 480px) {
      .photo-grid { grid-template-columns: 1fr; grid-auto-rows: 220px; }
      .photo-item:nth-child(1) { grid-row: span 1; }
    }
  </style>

</head>

  <script>
    // Language
    const body = document.body;
    function setLang(lang) {
      body.classList.toggle('lang-en',  lang === 'en');
      body.classList.toggle('lang-est', lang === 'est');
      localStorage.setItem('dep-lang', lang);
      document.querySelectorAll('[data-lang-switch]').forEach(b => {
        b.classList.toggle('active', b.dataset.langSwitch === lang);
      });
    }
    document.querySelectorAll('[data-lang-switch]').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.langSwitch));
    });
    const saved = localStorage.getItem('dep-lang');
    if (saved) setLang(saved);

    // Hamburger
    const hamburger = document.getElementById('hamburgerBtn');
    const drawer    = document.getElementById('mobileDrawer');
    function toggleDrawer(open) {
      hamburger.classList.toggle('open', open);
      drawer.classList.toggle('open', open);
      hamburger.setAttribute('aria-expanded', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }
    hamburger.addEventListener('click', () => toggleDrawer(!drawer.classList.contains('open')));
    drawer.querySelectorAll('.drawer-close-on-click').forEach(l => l.addEventListener('click', () => toggleDrawer(false)));

    // Scroll reveal
    const revealObs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

    // Lightbox
    const photos     = Array.from(document.querySelectorAll('.photo-item img'));
    const lightbox   = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCap = document.getElementById('lightboxCaption');
    let currentIndex  = 0;

    function openLightbox(idx) {
      currentIndex = idx;
      lightboxImg.src = photos[idx].src;
      lightboxImg.alt = photos[idx].alt;
      lightboxCap.textContent = `${idx + 1} / ${photos.length}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
    function prevPhoto() { openLightbox((currentIndex - 1 + photos.length) % photos.length); }
    function nextPhoto() { openLightbox((currentIndex + 1) % photos.length); }

    document.querySelectorAll('.photo-item').forEach((item, idx) => {
      item.addEventListener('click', () => openLightbox(idx));
    });
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', prevPhoto);
    document.getElementById('lightboxNext').addEventListener('click', nextPhoto);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeLightbox(); toggleDrawer(false); }
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  prevPhoto();
      if (e.key === 'ArrowRight') nextPhoto();
    });
  </script>

</body>
</html>
