<!doctype html>
<html lang="en">
<head>
  <meta name="description" content="Duo EnPassant – viiul ja tšello duo pulmadeks, üritusteks ja kontsertideks.">
<meta property="og:title" content="Duo EnPassant | Viiul & Tšello">
<meta property="og:image" content="https://www.duoenpassant.com/1.png">
<meta property="og:url" content="https://www.duoenpassant.com/">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Duo EnPassant | Violin & Cello Duo</title>
  <meta name="description" content="Duo EnPassant — violin and cello duo performing classical chamber music." />
  <link rel="canonical" href="https://www.duoenpassant.com/" />
  <link rel="preload" as="image" href="1.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1614;
      --parchment: #f5f0e8;
      --warm: #c8a96e;
      --muted: #7a6f65;
      --line: rgba(200,169,110,0.4);
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Cormorant Garamond', Georgia, serif; }

    .bg-photo {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      z-index: 0;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(20,16,14,0.55) 0%, rgba(20,16,14,0.65) 60%, rgba(20,16,14,0.80) 100%);
      z-index: 1;
    }
    .landing {
      position: relative; z-index: 3;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
    }

    /* Language switcher */
    .lang-row {
      position: absolute; top: 1.8rem; right: 2.2rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .lang-btn {
      cursor: pointer; background: none;
      border: 1px solid transparent;
      color: rgba(245,240,232,0.5);
      font-family: 'Cinzel', serif; font-size: 0.82rem; letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
      padding: 0.3rem 0.75rem; border-radius: 2px;
    }
    .lang-btn:hover { color: rgba(245,240,232,0.9); }
    .lang-btn.active { color: var(--warm); border-color: var(--line); }
    .lang-separator { color: rgba(200,169,110,0.35); font-size: 0.82rem; font-family: 'Cinzel', serif; }

    /* Content */
    .landing-content {
      text-align: center;
      opacity: 0; transform: translateY(28px);
    }
    .landing-content.ready {
      animation: fadeUp 1.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .clef-hero { width: 80px; height: 80px; margin: 0 auto 2rem; display: block; }
    .landing-eyebrow {
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      letter-spacing: 0.55em; text-transform: uppercase;
      color: var(--warm); margin-bottom: 1.6rem;
    }
    .landing-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 400; color: var(--parchment);
      letter-spacing: 0.08em; line-height: 1.05; margin-bottom: 0.3rem;
    }
    .landing-title em {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(2.8rem, 7vw, 4.8rem); font-weight: 300;
      color: var(--warm); letter-spacing: 0.02em;
    }
    .landing-rule {
      width: 160px; height: 1px;
      background: linear-gradient(to right, transparent, var(--warm), transparent);
      margin: 2rem auto;
    }
    .landing-sub {
      font-family: 'Raleway', sans-serif; font-size: 0.65rem;
      font-weight: 300; letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(245,240,232,0.55); margin-bottom: 2.8rem;
    }
    .landing-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 1.6vw, 1.15rem); font-weight: 300;
      color: rgba(245,240,232,0.5); font-style: italic;
      line-height: 2; margin-bottom: 2.8rem;
    }
    .enter-btn {
      display: inline-block;
      font-family: 'Cinzel', serif; font-size: 0.65rem;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--parchment);
      border: 1px solid rgba(200,169,110,0.5);
      padding: 0.9rem 2.6rem; text-decoration: none;
      position: relative; overflow: hidden;
      transition: color 0.3s, border-color 0.3s;
    }
    .enter-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--warm); transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); z-index: 0;
    }
    .enter-btn:hover { color: var(--ink); border-color: var(--warm); }
    .enter-btn:hover::before { transform: translateX(0); }
    .enter-btn span { position: relative; z-index: 1; }

    /* Language show/hide */
    [data-lang] { display: none; }
    body.lang-en  [data-lang="en"]  { display: inline; }
    body.lang-est [data-lang="est"] { display: inline; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .landing { padding: 1.5rem; }
      .lang-row { top: 1.2rem; right: 1.4rem; }
      .clef-hero { width: 64px; height: 64px; margin-bottom: 1.6rem; }
      .landing-rule { margin: 1.6rem auto; }
      .landing-names { margin-bottom: 2rem; }
      .landing-sub { margin-bottom: 2rem; }
    }
  </style>

</head>

<body class="lang-en">

  <img src="1.png" alt="" class="bg-photo" aria-hidden="true">
  <div class="bg-overlay" aria-hidden="true"></div>

  <div class="landing">

    <div class="lang-row" aria-label="Language selector">
      <button class="lang-btn active" data-lang-switch="en"  type="button">EN</button>
      <span class="lang-separator">|</span>
      <button class="lang-btn"        data-lang-switch="est" type="button">EST</button>
    </div>

    <div class="landing-content">
      <svg class="clef-hero" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line x1="8" y1="36" x2="82" y2="36" stroke="#c8a96e" stroke-width="0.8" opacity="0.5"/>
        <line x1="8" y1="43" x2="82" y2="43" stroke="#c8a96e" stroke-width="0.8" opacity="0.5"/>
        <line x1="8" y1="50" x2="82" y2="50" stroke="#c8a96e" stroke-width="0.8" opacity="0.5"/>
        <line x1="8" y1="57" x2="82" y2="57" stroke="#c8a96e" stroke-width="0.8" opacity="0.5"/>
        <line x1="8" y1="64" x2="82" y2="64" stroke="#c8a96e" stroke-width="0.8" opacity="0.5"/>
        <text x="8"  y="72" font-family="serif" font-size="62" fill="#f5f0e8">𝄞</text>
        <text x="50" y="60" font-family="serif" font-size="40" fill="#c8a96e">𝄢</text>
      </svg>

      <p class="landing-eyebrow">
        <span data-lang="en">Violin &amp; Cello</span>
        <span data-lang="est">Viiul &amp; Tšello</span>
      </p>

      <h1 class="landing-title">Duo <em>En<br>Passant</em></h1>

      <div class="landing-rule"></div>

      <p class="landing-sub">
        <span data-lang="en">International String Duo</span>
        <span data-lang="est">Rahvusvaheline keelpilliduo</span>
      </p>

      <p class="landing-names">
        Merily Leotoots<br>
        Anna Ryland-Jones
      </p>

      <a href="site.html" class="enter-btn" id="enterBtn">
        <span data-lang="en">Enter</span>
        <span data-lang="est">Sisene</span>
      </a>
    </div>

  </div>

  <script>
    const body = document.body;

    function setLang(lang) {
      body.classList.toggle('lang-en',  lang === 'en');
      body.classList.toggle('lang-est', lang === 'est');
      localStorage.setItem('dep-lang', lang);
      document.querySelectorAll('[data-lang-switch]').forEach(b => {
        b.classList.toggle('active', b.dataset.langSwitch === lang);
      });
    }

    const saved = localStorage.getItem('dep-lang');
    if (saved) setLang(saved);

    document.querySelectorAll('[data-lang-switch]').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.langSwitch));
    });

    // Näita sisu alles siis, kui taustapilt on laaditud
    const img = document.querySelector('.bg-photo');
    const content = document.querySelector('.landing-content');

    function revealContent() {
      content.classList.add('ready');
    }

    if (img.complete) {
      revealContent();
    } else {
      img.addEventListener('load', revealContent);
      setTimeout(revealContent, 3000); // Näita ikkagi 3 sek pärast
    }
  </script>

</body>
</html>
