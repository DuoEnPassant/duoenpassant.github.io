<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Duo EnPassant | Violin & Cello Duo</title>
  <meta name="description" content="Duo EnPassant — violin and cello duo performing classical chamber music." />
  <link rel="canonical" href="https://www.duoenpassant.com/" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #1a1614;
      --parchment: #f5f0e8;
      --warm: #c8a96e;
      --muted: #7a6f65;
      --line: rgba(200, 169, 110, 0.3);
    }

    html, body {
      height: 100%;
      background-color: var(--parchment);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.6;
    }

    .landing {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
    }

    .landing-left {
      background-color: var(--ink);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem;
    }

    .landing-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 40% 50%, rgba(200,169,110,0.1) 0%, transparent 65%);
      z-index: 1;
    }

    .landing-photo {
      position: absolute;
      inset: 0;
      object-fit: cover;
      width: 100%;
      height: 100%;
      opacity: 0.35;
      filter: grayscale(30%);
    }

    .staff-lines {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      opacity: 0.05;
      pointer-events: none;
      z-index: 1;
    }
    .staff-lines span {
      display: block;
      height: 1px;
      background: var(--parchment);
      margin: 18px 0;
    }

    .left-content {
      position: relative;
      z-index: 2;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }

    .left-tag {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.4em;
      color: var(--warm);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: block;
    }

    .left-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 1.8vw, 1.3rem);
      font-weight: 300;
      color: rgba(245,240,232,0.6);
      font-style: italic;
      line-height: 1.9;
    }

    .landing-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 3rem;
      position: relative;
    }

    .landing-right::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15%;
      bottom: 15%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--warm), transparent);
    }

    .landing-content {
      text-align: center;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
    }

    .clef-hero {
      width: 90px;
      height: 90px;
      margin: 0 auto 2rem;
      display: block;
    }

    .landing-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 1.5rem;
    }

    .landing-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.08em;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    .landing-title em {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(2.4rem, 4.5vw, 3.8rem);
      font-weight: 300;
      color: var(--warm);
      letter-spacing: 0.02em;
    }

    .landing-rule {
      width: 180px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--warm), transparent);
      margin: 2rem auto;
    }

    .landing-sub {
      font-family: 'Raleway', sans-serif;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .enter-btn {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 0.9rem 2.4rem;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ink);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
      z-index: 0;
    }
    .enter-btn:hover { color: var(--parchment); border-color: var(--ink); }
    .enter-btn:hover::before { transform: translateX(0); }
    .enter-btn span { position: relative; z-index: 1; }

    .lang-row {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 5;
    }
    .lang-btn {
      cursor: pointer;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 0;
    }
    .lang-btn.active { color: var(--warm); }
    .lang-separator { color: var(--line); font-family: 'Cinzel', serif; font-size: 0.65rem; }

    [data-lang] { display: none; }
    body.lang-en [data-lang="en"] { display: block; }
    body.lang-est [data-lang="est"] { display: block; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) {
      html, body { overflow: auto; }
      .landing { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .landing-left { min-height: 45vh; padding: 2.5rem 2rem; }
      .landing-right { padding: 3rem 2rem; }
      .landing-right::before { display: none; }
      .lang-row { top: 1rem; right: 1rem; }
    }
  </style>

</head>

  </div>

  <script>
    const body = document.body;
    document.querySelectorAll('[data-lang-switch]').forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.dataset.langSwitch;
        body.classList.toggle('lang-en', lang === 'en');
        body.classList.toggle('lang-est', lang === 'est');
        document.querySelectorAll('[data-lang-switch]').forEach(b => {
          b.classList.toggle('active', b === btn);
        });
      });
    });
  </script>
