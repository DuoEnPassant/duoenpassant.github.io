<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Media | Duo EnPassant</title>
  <meta name="description" content="Media — Duo EnPassant violin and cello duo. Videos and photos." />

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">

  <style>
    :root {
      --bg: #000000;
      --text: #f5f5f5;
      --muted: #d0d0d0;
      --gold: #d4af37;
      --accent: #ffffff;
      --max-width: 1100px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', serif;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* NAV */

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(6px);
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1.2rem;
      max-width: var(--max-width);
      margin: 0 auto;
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .site-logo {
      height: 70px;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-link {
      color: var(--muted);
    }

    .nav-link:hover {
      color: var(--gold);
    }

    /* PAGE */

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2.5rem;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .video-grid,
    .media-grid {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .video-grid iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 6px;
      border: none;
    }

    .media-item {
      aspect-ratio: 3/4;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
    }

    .media-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.25s;
    }

    .media-item:hover img {
      transform: scale(1.02);
      opacity: 0.85;
    }

    /* LIGHTBOX */

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .lightbox.visible {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2rem;
      color: var(--gold);
      cursor: pointer;
    }

    /* SPACING */

    .section {
      margin-bottom: 3.5rem;
    }

  </style>
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <a href="site.html">
        <img src="EPlogo.png" class="site-logo">
      </a>

      <nav class="nav-links">
        <a href="media.html" class="nav-link">Media</a>
        <a href="concerts.html" class="nav-link">Concerts</a>
        <a href="site.html#contact" class="nav-link">Contact</a>
      </nav>
    </div>
  </div>
</header>

<div class="container">

  <div class="page-title">Media</div>

  <!-- VIDEOS -->
  <div class="section">
    <div class="section-title">Videos</div>

    <div class="video-grid">
      <iframe src="https://www.youtube.com/embed/KshG1i6PzKw" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/Q8cl2DfWa3c" allowfullscreen></iframe>
    </div>
  </div>

  <!-- PHOTOS -->
  <div class="section">
    <div class="section-title">Photos</div>

    <div class="media-grid">
      <div class="media-item">
        <img src="EP.jpg">
      </div>

      <div class="media-item">
        <img src="Intro.png">
      </div>

      <div class="media-item">
        <img src="img.jpg">
      </div>
    </div>
  </div>

</div>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="close">&times;</span>
  <img id="lightbox-img">
</div>

<script>
  const lightbox = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');

  document.querySelectorAll('.media-item img').forEach(el => {
    el.addEventListener('click', () => {
      img.src = el.src;
      lightbox.classList.add('visible');
    });
  });

  document.getElementById('close').onclick = () => {
    lightbox.classList.remove('visible');
  };

  lightbox.onclick = (e) => {
    if (e.target === lightbox) {
      lightbox.classList.remove('visible');
    }
  };
</script>

</body>
</html>
